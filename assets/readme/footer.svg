<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="100%" role="img" aria-labelledby="footerTitle footerDesc">
  <title id="footerTitle">README MADE WITH · 签名</title>
  <desc id="footerDesc">项目原生签名:左为 README MADE WITH 与项目散点 motif,右为作者与 License 信息。</desc>

  <defs>
    <style>
      .stack { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono  { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- 纸面背景 -->
  <rect x="0" y="0" width="1200" height="100" rx="14" ry="14" fill="#FBF9F4" stroke="#E4E0D8" stroke-width="1"/>

  <!-- 左侧:签名 + 项目散点 motif -->
  <g transform="translate(48, 24)">
    <!-- 项目散点 motif:7 个砖红点,沿对角线分布,呼应 hero 的散点图 -->
    <g fill="#C44536" fill-opacity="0.78">
      <circle cx="6"   cy="44" r="3"/>
      <circle cx="14"  cy="38" r="3"/>
      <circle cx="22"  cy="32" r="3"/>
      <circle cx="30"  cy="26" r="3"/>
      <circle cx="38"  cy="20" r="3"/>
      <circle cx="46"  cy="14" r="3"/>
    </g>
    <!-- 趋势线 -->
    <line x1="6" y1="44" x2="46" y2="14" stroke="#6B4E8C" stroke-width="1.5" stroke-linecap="round"/>

    <text x="64" y="24" class="mono" font-size="10" letter-spacing="2" fill="#8B8680">README MADE WITH</text>
    <text x="64" y="48" class="stack" font-size="16" font-weight="600" fill="#1A1A1A">Shapiro-Wilk · Pearson · Spearman</text>
    <text x="64" y="68" class="mono" font-size="11" fill="#8B8680">30 大学生样本 · r ≈ 0.995 · 强正线性相关</text>
  </g>

  <!-- 右侧:作者与 License -->
  <g transform="translate(1152, 24)">
    <!-- 顶部细色条 -->
    <rect x="-56" y="0" width="56" height="3" fill="#6B4E8C"/>

    <text x="0" y="24" class="mono" font-size="10" letter-spacing="2" fill="#8B8680" text-anchor="end">AUTHOR</text>
    <text x="0" y="48" class="stack" font-size="16" font-weight="600" fill="#1A1A1A" text-anchor="end">liem</text>
    <text x="0" y="68" class="mono" font-size="11" fill="#8B8680" text-anchor="end">MIT License · Python 3</text>
  </g>
</svg>
