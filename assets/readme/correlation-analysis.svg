<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" role="img" aria-labelledby="corrTitle corrDesc">
  <title id="corrTitle">相关性分析</title>
  <desc id="corrDesc">30 名大学生身高-体重散点图,叠加 Pearson 回归趋势线。r ≈ 0.9954, p ≈ 3.9e-30,强正线性相关。</desc>

  <defs>
    <style>
      .stack { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono  { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- 纸面背景 -->
  <rect x="0" y="0" width="1200" height="320" rx="14" ry="14" fill="#FBF9F4"/>

  <!-- 标题块 -->
  <g transform="translate(48, 32)">
    <rect x="0" y="0" width="56" height="3" fill="#6B4E8C"/>
    <text x="0" y="28" class="mono" font-size="12" letter-spacing="2" fill="#8B8680">CORRELATION</text>
    <text x="0" y="56" class="stack" font-size="22" font-weight="600" fill="#1A1A1A">相关性分析</text>
  </g>
  <text x="1152" y="68" class="stack" font-size="13" fill="#8B8680" text-anchor="end">Pearson · 两变量均通过 Shapiro-Wilk 正态性检验</text>

  <!-- ============ 左侧:大散点图 ============ -->
  <g transform="translate(48, 88)">
    <rect x="0" y="0" width="712" height="212" rx="8" ry="8" fill="#FFFFFF" stroke="#E4E0D8" stroke-width="1"/>

    <!-- 绘图区: x in [32, 692] (宽 660), y in [12, 192] (高 180)
         data x: 164..178, data y: 51..76 -->
    <!-- 网格线 -->
    <g stroke="#EDE9E0" stroke-width="1">
      <line x1="32" y1="12"  x2="692" y2="12"/>
      <line x1="32" y1="48"  x2="692" y2="48"/>
      <line x1="32" y1="84"  x2="692" y2="84"/>
      <line x1="32" y1="120" x2="692" y2="120"/>
      <line x1="32" y1="156" x2="692" y2="156"/>
      <line x1="32" y1="192" x2="692" y2="192"/>
    </g>

    <!-- 坐标轴 -->
    <line x1="32" y1="192" x2="692" y2="192" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="32" y1="12"  x2="32"  y2="192" stroke="#1A1A1A" stroke-width="1"/>

    <!-- x 轴刻度 -->
    <g class="mono" font-size="10" fill="#8B8680" text-anchor="middle">
      <text x="32"  y="208">164</text>
      <text x="150" y="208">167</text>
      <text x="268" y="208">170</text>
      <text x="386" y="208">173</text>
      <text x="504" y="208">176</text>
      <text x="692" y="208">178</text>
    </g>

    <!-- y 轴刻度 -->
    <g class="mono" font-size="10" fill="#8B8680" text-anchor="end">
      <text x="26" y="195">51</text>
      <text x="26" y="159">56</text>
      <text x="26" y="123">61</text>
      <text x="26" y="87">66</text>
      <text x="26" y="51">71</text>
      <text x="26" y="15">76</text>
    </g>

    <!-- 轴标题 -->
    <text x="362" y="208" class="stack" font-size="11" fill="#1A1A1A" text-anchor="end" dx="190">身高 (cm)</text>
    <text x="-4" y="102" class="stack" font-size="11" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90, -4, 102)">体重 (kg)</text>

    <!-- 回归趋势线: y = 1.809x - 246.38
         x=164 -> y=50.3 (clip), x=178 -> y=75.62 -->
    <line x1="32" y1="192" x2="692" y2="15" stroke="#6B4E8C" stroke-width="2" stroke-linecap="round"/>

    <!-- 30 个真实散点: 砖红 #C44536, r=4 -->
    <g fill="#C44536" fill-opacity="0.78">
      <circle cx="79"  cy="185" r="4"/>
      <circle cx="419" cy="91"  r="4"/>
      <circle cx="224" cy="142" r="4"/>
      <circle cx="569" cy="44"  r="4"/>
      <circle cx="326" cy="110" r="4"/>
      <circle cx="277" cy="131" r="4"/>
      <circle cx="467" cy="67"  r="4"/>
      <circle cx="370" cy="103" r="4"/>
      <circle cx="171" cy="153" r="4"/>
      <circle cx="520" cy="74"  r="4"/>
      <circle cx="123" cy="169" r="4"/>
      <circle cx="617" cy="41"  r="4"/>
      <circle cx="32"  cy="192" r="4"/>
      <circle cx="665" cy="19"  r="4"/>
      <circle cx="419" cy="99"  r="4"/>
      <circle cx="277" cy="123" r="4"/>
      <circle cx="569" cy="36"  r="4"/>
      <circle cx="326" cy="118" r="4"/>
      <circle cx="224" cy="150" r="4"/>
      <circle cx="467" cy="84"  r="4"/>
      <circle cx="370" cy="110" r="4"/>
      <circle cx="79"  cy="177" r="4"/>
      <circle cx="520" cy="67"  r="4"/>
      <circle cx="171" cy="162" r="4"/>
      <circle cx="692" cy="12"  r="4"/>
      <circle cx="326" cy="118" r="4"/>
      <circle cx="123" cy="169" r="4"/>
      <circle cx="419" cy="91"  r="4"/>
      <circle cx="277" cy="131" r="4"/>
      <circle cx="370" cy="103" r="4"/>
    </g>

    <!-- 置信带示意(两条平行淡线) -->
    <line x1="32" y1="178" x2="692" y2="1" stroke="#6B4E8C" stroke-width="1" stroke-dasharray="2,3" opacity="0.35"/>
    <line x1="32" y1="206" x2="692" y2="29" stroke="#6B4E8C" stroke-width="1" stroke-dasharray="2,3" opacity="0.35"/>
  </g>

  <!-- ============ 右侧:r 值与公式 ============ -->
  <g transform="translate(780, 88)">
    <rect x="0" y="0" width="372" height="212" rx="8" ry="8" fill="#FFFFFF" stroke="#E4E0D8" stroke-width="1"/>

    <!-- r 大数 -->
    <text x="20" y="36" class="mono" font-size="11" letter-spacing="1.5" fill="#8B8680">PEARSON r</text>
    <text x="20" y="78" class="stack" font-size="44" font-weight="700" fill="#6B4E8C">0.9954</text>
    <text x="20" y="100" class="mono" font-size="11" fill="#8B8680">p ≈ 3.9 × 10⁻³⁰</text>

    <!-- 分隔线 -->
    <line x1="20" y1="116" x2="352" y2="116" stroke="#E4E0D8" stroke-width="1"/>

    <!-- 公式 -->
    <text x="20" y="138" class="mono" font-size="10" letter-spacing="1.5" fill="#8B8680">FORMULA</text>
    <text x="20" y="160" class="mono" font-size="11" fill="#1A1A1A">r = Σ((xi − x̄)(yi − ȳ))</text>
    <text x="20" y="176" class="mono" font-size="11" fill="#1A1A1A">    ─────────────────</text>
    <text x="20" y="192" class="mono" font-size="11" fill="#1A1A1A">    √(Σ(xi−x̄)² · Σ(yi−ȳ)²)</text>

    <!-- 底部说明 -->
    <text x="20" y="208" class="stack" font-size="11" fill="#C44536">强正线性相关 · 显著</text>
  </g>
</svg>
