<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%" role="img" aria-labelledby="bmiTitle bmiDesc">
  <title id="bmiTitle">BMI 分析</title>
  <desc id="bmiDesc">30 名大学生 BMI 分布直方图,叠加中国成人 BMI 分类参考线。所有 30 人均落在正常范围,均值约 21.33。</desc>

  <defs>
    <style>
      .stack { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono  { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- 纸面背景 -->
  <rect x="0" y="0" width="1200" height="280" rx="14" ry="14" fill="#FBF9F4"/>

  <!-- 标题块 -->
  <g transform="translate(48, 32)">
    <rect x="0" y="0" width="56" height="3" fill="#6B4E8C"/>
    <text x="0" y="28" class="mono" font-size="12" letter-spacing="2" fill="#8B8680">BMI ANALYSIS</text>
    <text x="0" y="56" class="stack" font-size="22" font-weight="600" fill="#1A1A1A">BMI 分析</text>
  </g>
  <text x="1152" y="68" class="stack" font-size="13" fill="#8B8680" text-anchor="end">BMI = 体重 / 身高² (m²) · 中国成人标准</text>

  <!-- ============ 左侧:BMI 分布直方图 ============ -->
  <g transform="translate(48, 88)">
    <rect x="0" y="0" width="672" height="172" rx="8" ry="8" fill="#FFFFFF" stroke="#E4E0D8" stroke-width="1"/>

    <!-- 类别背景带: underweight [18,18.5), normal [18.5,24), overweight [24,28), obese [28,30)
         Plot area: x in [50, 650] (宽 600), y in [30, 140] (高 110)
         1 BMI unit = 50 px, so 18 -> x=50, 30 -> x=650 -->
    <!-- 偏瘦区(细窄) -->
    <rect x="50" y="30" width="25" height="110" fill="#C44536" fill-opacity="0.06"/>
    <!-- 正常区(占大部分) -->
    <rect x="75" y="30" width="275" height="110" fill="#6B4E8C" fill-opacity="0.06"/>
    <!-- 超重区 -->
    <rect x="350" y="30" width="200" height="110" fill="#D6A35C" fill-opacity="0.08"/>
    <!-- 肥胖区 -->
    <rect x="550" y="30" width="100" height="110" fill="#C44536" fill-opacity="0.08"/>

    <!-- 类别边界参考线 -->
    <g stroke="#8B8680" stroke-width="1" stroke-dasharray="2,3">
      <line x1="75" y1="30" x2="75" y2="140"/>
      <line x1="350" y1="30" x2="350" y2="140"/>
      <line x1="550" y1="30" x2="550" y2="140"/>
    </g>

    <!-- 网格线 -->
    <g stroke="#EDE9E0" stroke-width="1">
      <line x1="50" y1="30"  x2="650" y2="30"/>
      <line x1="50" y1="58"  x2="650" y2="58"/>
      <line x1="50" y1="86"  x2="650" y2="86"/>
      <line x1="50" y1="113" x2="650" y2="113"/>
      <line x1="50" y1="140" x2="650" y2="140"/>
    </g>

    <!-- 坐标轴 -->
    <line x1="50" y1="140" x2="650" y2="140" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="50" y1="30"  x2="50"  y2="140" stroke="#1A1A1A" stroke-width="1"/>

    <!-- y 轴刻度 (count: 0,2,4,6,8,10) -->
    <g class="mono" font-size="9" fill="#8B8680" text-anchor="end">
      <text x="44" y="143">0</text>
      <text x="44" y="117">2</text>
      <text x="44" y="89">4</text>
      <text x="44" y="61">6</text>
      <text x="44" y="33">10</text>
    </g>

    <!-- 直方柱: 6 bins, bar width 46, gap 4
         bins: [18,19)=1, [19,20)=5, [20,21)=5, [21,22)=10, [22,23)=5, [23,24)=4
         max=10 -> 110 px -->
    <g fill="#6B4E8C">
      <rect x="52"  y="129" width="46" height="11"/>   <!-- 1 -->
      <rect x="102" y="85"  width="46" height="55"/>   <!-- 5 -->
      <rect x="152" y="85"  width="46" height="55"/>   <!-- 5 -->
      <rect x="202" y="30"  width="46" height="110"/>  <!-- 10 -->
      <rect x="252" y="85"  width="46" height="55"/>   <!-- 5 -->
      <rect x="302" y="96"  width="46" height="44"/>   <!-- 4 -->
    </g>

    <!-- 均值参考线 μ=21.33 -->
    <line x1="216.5" y1="30" x2="216.5" y2="140" stroke="#C44536" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="216.5" y="24" class="mono" font-size="10" fill="#C44536" text-anchor="middle">μ=21.33</text>

    <!-- x 轴刻度 -->
    <g class="mono" font-size="9" fill="#8B8680" text-anchor="middle">
      <text x="50"  y="154">18</text>
      <text x="150" y="154">20</text>
      <text x="250" y="154">22</text>
      <text x="350" y="154">24</text>
      <text x="450" y="154">26</text>
      <text x="550" y="154">28</text>
      <text x="650" y="154">30</text>
    </g>

    <!-- 类别标签 -->
    <g class="mono" font-size="9" fill="#8B8680" text-anchor="middle">
      <text x="62"  y="168">偏瘦</text>
      <text x="212" y="168">正常</text>
      <text x="450" y="168">超重</text>
      <text x="600" y="168">肥胖</text>
    </g>
  </g>

  <!-- ============ 右侧:分类统计 ============ -->
  <g transform="translate(740, 88)">
    <rect x="0" y="0" width="412" height="172" rx="8" ry="8" fill="#FFFFFF" stroke="#E4E0D8" stroke-width="1"/>

    <text x="20" y="28" class="mono" font-size="11" letter-spacing="1.5" fill="#8B8680">CATEGORY BREAKDOWN</text>

    <!-- 均值大数 -->
    <text x="20" y="58" class="stack" font-size="11" fill="#8B8680">Mean BMI</text>
    <text x="20" y="88" class="stack" font-size="28" font-weight="700" fill="#6B4E8C">21.33</text>
    <text x="90" y="88" class="mono" font-size="11" fill="#8B8680">kg/m²</text>
    <text x="20" y="106" class="mono" font-size="10" fill="#8B8680">range 18.96 - 23.99</text>

    <!-- 分隔线 -->
    <line x1="20" y1="116" x2="392" y2="116" stroke="#E4E0D8" stroke-width="1"/>

    <!-- 4 分类行 -->
    <g transform="translate(20, 128)">
      <!-- 偏瘦 -->
      <text x="0" y="10" class="stack" font-size="11" fill="#1A1A1A">偏瘦</text>
      <text x="60" y="10" class="mono" font-size="10" fill="#8B8680">&lt; 18.5</text>
      <text x="372" y="10" class="mono" font-size="11" fill="#8B8680" text-anchor="end">0 · 0%</text>

      <!-- 正常 (highlighted) -->
      <rect x="-4" y="14" width="380" height="14" rx="2" ry="2" fill="#6B4E8C" fill-opacity="0.08"/>
      <text x="0" y="26" class="stack" font-size="11" font-weight="600" fill="#6B4E8C">正常</text>
      <text x="60" y="26" class="mono" font-size="10" fill="#8B8680">18.5 - 24</text>
      <text x="372" y="26" class="mono" font-size="11" font-weight="700" fill="#6B4E8C" text-anchor="end">30 · 100%</text>

      <!-- 超重 -->
      <text x="0" y="42" class="stack" font-size="11" fill="#1A1A1A">超重</text>
      <text x="60" y="42" class="mono" font-size="10" fill="#8B8680">24 - 28</text>
      <text x="372" y="42" class="mono" font-size="11" fill="#8B8680" text-anchor="end">0 · 0%</text>
    </g>
  </g>
</svg>
