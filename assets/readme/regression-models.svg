<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" role="img" aria-labelledby="regTitle regDesc">
  <title id="regTitle">回归模型对比</title>
  <desc id="regDesc">30 名大学生身高-体重散点图叠加线性回归与二次多项式回归。线性 R² ≈ 0.991,多项式 R² ≈ 0.992,提升可忽略。</desc>

  <defs>
    <style>
      .stack { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono  { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- 纸面背景 -->
  <rect x="0" y="0" width="1200" height="360" rx="14" ry="14" fill="#FBF9F4"/>

  <!-- 标题块 -->
  <g transform="translate(48, 32)">
    <rect x="0" y="0" width="56" height="3" fill="#6B4E8C"/>
    <text x="0" y="28" class="mono" font-size="12" letter-spacing="2" fill="#8B8680">REGRESSION MODELS</text>
    <text x="0" y="56" class="stack" font-size="22" font-weight="600" fill="#1A1A1A">回归模型对比</text>
  </g>
  <text x="1152" y="68" class="stack" font-size="13" fill="#8B8680" text-anchor="end">数据高度线性,多项式提升可忽略</text>

  <!-- ============ 左侧:散点 + 双拟合线 ============ -->
  <g transform="translate(48, 88)">
    <rect x="0" y="0" width="732" height="252" rx="8" ry="8" fill="#FFFFFF" stroke="#E4E0D8" stroke-width="1"/>

    <!-- 绘图区: x in [40, 700] (宽 660), y in [40, 240] (高 200)
         data x: 164..178, data y: 50..77 -->

    <!-- 网格线 -->
    <g stroke="#EDE9E0" stroke-width="1">
      <line x1="40" y1="40"  x2="700" y2="40"/>
      <line x1="40" y1="80"  x2="700" y2="80"/>
      <line x1="40" y1="120" x2="700" y2="120"/>
      <line x1="40" y1="160" x2="700" y2="160"/>
      <line x1="40" y1="200" x2="700" y2="200"/>
      <line x1="40" y1="240" x2="700" y2="240"/>
    </g>

    <!-- 坐标轴 -->
    <line x1="40" y1="240" x2="700" y2="240" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="40" y1="40"  x2="40"  y2="240" stroke="#1A1A1A" stroke-width="1"/>

    <!-- x 轴刻度 -->
    <g class="mono" font-size="10" fill="#8B8680" text-anchor="middle">
      <text x="40"  y="256">164</text>
      <text x="158" y="256">167</text>
      <text x="276" y="256">170</text>
      <text x="394" y="256">173</text>
      <text x="512" y="256">176</text>
      <text x="700" y="256">178</text>
    </g>

    <!-- y 轴刻度 -->
    <g class="mono" font-size="10" fill="#8B8680" text-anchor="end">
      <text x="34" y="243">50</text>
      <text x="34" y="213">54</text>
      <text x="34" y="184">58</text>
      <text x="34" y="154">62</text>
      <text x="34" y="124">66</text>
      <text x="34" y="94">70</text>
      <text x="34" y="64">74</text>
      <text x="34" y="44">77</text>
    </g>

    <!-- 轴标题 -->
    <text x="370" y="252" class="stack" font-size="11" fill="#1A1A1A" text-anchor="end" dx="190">身高 (cm)</text>
    <text x="4" y="140" class="stack" font-size="11" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90, 4, 140)">体重 (kg)</text>

    <!-- 多项式回归(二次)虚线: illustrative, 微弱弯曲
         M 40 238 C 200 200, 540 90, 700 50 -->
    <path d="M 40 238 C 200 200, 540 90, 700 50" stroke="#C44536" stroke-width="1.8" fill="none" stroke-dasharray="6,4" stroke-linecap="round"/>

    <!-- 线性回归: y = 1.809x - 246.38, 深紫罗兰实线 2px -->
    <line x1="40" y1="238" x2="700" y2="50" stroke="#6B4E8C" stroke-width="2" stroke-linecap="round"/>

    <!-- 30 个真实散点 -->
    <g fill="#1A1A1A" fill-opacity="0.55">
      <circle cx="87"  cy="225" r="3.5"/>
      <circle cx="417" cy="129" r="3.5"/>
      <circle cx="229" cy="181" r="3.5"/>
      <circle cx="559" cy="92"  r="3.5"/>
      <circle cx="323" cy="151" r="3.5"/>
      <circle cx="276" cy="173" r="3.5"/>
      <circle cx="464" cy="107" r="3.5"/>
      <circle cx="370" cy="144" r="3.5"/>
      <circle cx="181" cy="196" r="3.5"/>
      <circle cx="511" cy="114" r="3.5"/>
      <circle cx="134" cy="210" r="3.5"/>
      <circle cx="606" cy="77"  r="3.5"/>
      <circle cx="40"  cy="233" r="3.5"/>
      <circle cx="653" cy="55"  r="3.5"/>
      <circle cx="417" cy="136" r="3.5"/>
      <circle cx="276" cy="166" r="3.5"/>
      <circle cx="559" cy="84"  r="3.5"/>
      <circle cx="323" cy="158" r="3.5"/>
      <circle cx="229" cy="188" r="3.5"/>
      <circle cx="464" cy="121" r="3.5"/>
      <circle cx="370" cy="151" r="3.5"/>
      <circle cx="87"  cy="218" r="3.5"/>
      <circle cx="511" cy="107" r="3.5"/>
      <circle cx="181" cy="203" r="3.5"/>
      <circle cx="700" cy="47"  r="3.5"/>
      <circle cx="323" cy="158" r="3.5"/>
      <circle cx="134" cy="210" r="3.5"/>
      <circle cx="417" cy="129" r="3.5"/>
      <circle cx="276" cy="173" r="3.5"/>
      <circle cx="370" cy="144" r="3.5"/>
    </g>

    <!-- 图例 -->
    <g transform="translate(50, 50)">
      <rect x="0" y="0" width="184" height="48" rx="4" ry="4" fill="#FBF9F4" stroke="#E4E0D8" stroke-width="1"/>
      <line x1="10" y1="16" x2="30" y2="16" stroke="#6B4E8C" stroke-width="2"/>
      <text x="36" y="20" class="mono" font-size="10" fill="#1A1A1A">线性 (本项目)</text>
      <line x1="10" y1="34" x2="30" y2="34" stroke="#C44536" stroke-width="1.8" stroke-dasharray="4,3"/>
      <text x="36" y="38" class="mono" font-size="10" fill="#1A1A1A">多项式 (对比)</text>
    </g>
  </g>

  <!-- ============ 右侧:R² 对比 ============ -->
  <g transform="translate(800, 88)">
    <rect x="0" y="0" width="352" height="252" rx="8" ry="8" fill="#FFFFFF" stroke="#E4E0D8" stroke-width="1"/>

    <text x="20" y="32" class="mono" font-size="11" letter-spacing="1.5" fill="#8B8680">R² COMPARISON</text>
    <text x="20" y="58" class="stack" font-size="16" font-weight="600" fill="#1A1A1A">决定系数对比</text>

    <!-- 线性 R² 行 (primary) -->
    <g transform="translate(20, 78)">
      <rect x="0" y="0" width="312" height="64" rx="6" ry="6" fill="#FBF9F4" stroke="#6B4E8C" stroke-width="1.5"/>
      <text x="12" y="20" class="mono" font-size="10" fill="#6B4E8C">LINEAR · y = 1.809x - 246.38</text>
      <text x="12" y="44" class="stack" font-size="22" font-weight="700" fill="#6B4E8C">R² ≈ 0.991</text>
      <text x="300" y="44" class="mono" font-size="10" fill="#8B8680" text-anchor="end">本项目</text>
      <!-- R² 进度条 -->
      <rect x="12" y="50" width="288" height="4" rx="2" ry="2" fill="#EDE9E0"/>
      <rect x="12" y="50" width="285" height="4" rx="2" ry="2" fill="#6B4E8C"/>
    </g>

    <!-- 多项式 R² 行 (comparison) -->
    <g transform="translate(20, 152)">
      <rect x="0" y="0" width="312" height="64" rx="6" ry="6" fill="#FBF9F4" stroke="#C44536" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="12" y="20" class="mono" font-size="10" fill="#C44536">POLYNOMIAL deg=2 (illustrative)</text>
      <text x="12" y="44" class="stack" font-size="22" font-weight="700" fill="#C44536">R² ≈ 0.992</text>
      <text x="300" y="44" class="mono" font-size="10" fill="#8B8680" text-anchor="end">对比</text>
      <!-- R² 进度条 -->
      <rect x="12" y="50" width="288" height="4" rx="2" ry="2" fill="#EDE9E0"/>
      <rect x="12" y="50" width="286" height="4" rx="2" ry="2" fill="#C44536"/>
    </g>

    <!-- 底部说明 -->
    <text x="20" y="240" class="stack" font-size="11" fill="#8B8680">ΔR² ≈ 0.001 · 线性已解释 99% 方差</text>
  </g>
</svg>
