<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="100%" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">身高体重数据分析</title>
  <desc id="heroDesc">身高体重相关性分析项目封面。左侧标题与统计方法标签,右侧 30 名大学生身高-体重散点图与回归趋势线,呈强正相关 r ≈ 0.995。</desc>

  <defs>
    <style>
      .stack { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono  { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- 纸面背景 -->
  <rect x="0" y="0" width="1200" height="360" rx="26" ry="26" fill="#FBF9F4"/>

  <!-- ============ 左侧标题块 ============ -->
  <g transform="translate(56, 44)">
    <!-- 顶部主色条 -->
    <rect x="0" y="0" width="56" height="3" fill="#6B4E8C"/>

    <!-- 小标签 -->
    <text x="0" y="32" class="mono" font-size="14" letter-spacing="2.4" fill="#8B8680">STATISTICS · CORRELATION</text>

    <!-- 大标题 -->
    <text x="0" y="92" class="stack" font-size="44" font-weight="700" fill="#1A1A1A">身高体重数据分析</text>

    <!-- 副标题 -->
    <text x="0" y="132" class="stack" font-size="18" fill="#8B8680">Shapiro-Wilk · Pearson · Spearman · 30 样本</text>

    <!-- 元数据 -->
    <text x="0" y="166" class="mono" font-size="14" fill="#8B8680">Python 3 · numpy · scipy.stats · matplotlib</text>

    <!-- 关键指标条 -->
    <g transform="translate(0, 208)">
      <rect x="0" y="0" width="100" height="44" rx="6" ry="6" fill="#FFFFFF" stroke="#E4E0D8" stroke-width="1"/>
      <text x="50" y="20" class="mono" font-size="10" letter-spacing="1.5" fill="#8B8680" text-anchor="middle">PEARSON r</text>
      <text x="50" y="36" class="stack" font-size="15" font-weight="700" fill="#6B4E8C" text-anchor="middle">0.9954</text>

      <rect x="112" y="0" width="100" height="44" rx="6" ry="6" fill="#FFFFFF" stroke="#E4E0D8" stroke-width="1"/>
      <text x="162" y="20" class="mono" font-size="10" letter-spacing="1.5" fill="#8B8680" text-anchor="middle">P-VALUE</text>
      <text x="162" y="36" class="stack" font-size="15" font-weight="700" fill="#C44536" text-anchor="middle">3.9e-30</text>

      <rect x="224" y="0" width="100" height="44" rx="6" ry="6" fill="#FFFFFF" stroke="#E4E0D8" stroke-width="1"/>
      <text x="274" y="20" class="mono" font-size="10" letter-spacing="1.5" fill="#8B8680" text-anchor="middle">SAMPLE n</text>
      <text x="274" y="36" class="stack" font-size="15" font-weight="700" fill="#1A1A1A" text-anchor="middle">30</text>
    </g>

    <!-- 作者署名 -->
    <text x="0" y="280" class="mono" font-size="12" fill="#8B8680">大学生样本 · 作者 liem</text>
  </g>

  <!-- ============ 右侧散点图 ============ -->
  <g transform="translate(760, 40)">
    <!-- 卡片底 -->
    <rect x="0" y="0" width="384" height="280" rx="8" ry="8" fill="#FFFFFF" stroke="#E4E0D8" stroke-width="1"/>

    <!-- 绘图区: x in [50, 364] (宽 314), y in [20, 240] (高 220)
         data x: 164..178, data y: 51..76 -->

    <!-- 横向网格线 -->
    <g stroke="#EDE9E0" stroke-width="1">
      <line x1="50" y1="20"  x2="364" y2="20"/>
      <line x1="50" y1="75"  x2="364" y2="75"/>
      <line x1="50" y1="130" x2="364" y2="130"/>
      <line x1="50" y1="185" x2="364" y2="185"/>
      <line x1="50" y1="240" x2="364" y2="240"/>
    </g>

    <!-- 坐标轴 -->
    <line x1="50" y1="240" x2="364" y2="240" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="50" y1="20"  x2="50"  y2="240" stroke="#1A1A1A" stroke-width="1"/>

    <!-- x 轴刻度 (身高 164..178) -->
    <g class="mono" font-size="10" fill="#8B8680" text-anchor="middle">
      <text x="50"  y="256">164</text>
      <text x="117" y="256">167</text>
      <text x="185" y="256">170</text>
      <text x="252" y="256">173</text>
      <text x="319" y="256">176</text>
      <text x="364" y="256">178</text>
    </g>

    <!-- y 轴刻度 (体重 51..76) -->
    <g class="mono" font-size="10" fill="#8B8680" text-anchor="end">
      <text x="44" y="244">51</text>
      <text x="44" y="200">56</text>
      <text x="44" y="156">61</text>
      <text x="44" y="112">66</text>
      <text x="44" y="68">71</text>
      <text x="44" y="24">76</text>
    </g>

    <!-- 轴标题 -->
    <text x="207" y="272" class="stack" font-size="11" fill="#1A1A1A" text-anchor="middle">身高 (cm)</text>
    <text x="14" y="130" class="stack" font-size="11" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90, 14, 130)">体重 (kg)</text>

    <!-- 回归趋势线: y = 1.809x - 246.43, 深紫罗兰 2px -->
    <!-- x=164 -> y=50.2 (clip to 51); x=178 -> y=75.6 -->
    <line x1="50" y1="236" x2="364" y2="21" stroke="#6B4E8C" stroke-width="2" stroke-linecap="round"/>

    <!-- 散点: 30 个真实样本点, 砖红 #C44536, r=3.5 -->
    <g fill="#C44536" fill-opacity="0.78">
      <circle cx="72"  cy="227" r="3.5"/>
      <circle cx="139" cy="134" r="3.5"/>
      <circle cx="95"  cy="187" r="3.5"/>
      <circle cx="163" cy="78"  r="3.5"/>
      <circle cx="117" cy="156" r="3.5"/>
      <circle cx="106" cy="173" r="3.5"/>
      <circle cx="151" cy="112" r="3.5"/>
      <circle cx="128" cy="147" r="3.5"/>
      <circle cx="84"  cy="200" r="3.5"/>
      <circle cx="157" cy="117" r="3.5"/>
      <circle cx="78"  cy="217" r="3.5"/>
      <circle cx="174" cy="64"  r="3.5"/>
      <circle cx="67"  cy="240" r="3.5"/>
      <circle cx="180" cy="51"  r="3.5"/>
      <circle cx="139" cy="121" r="3.5"/>
      <circle cx="106" cy="165" r="3.5"/>
      <circle cx="163" cy="86"  r="3.5"/>
      <circle cx="117" cy="160" r="3.5"/>
      <circle cx="95"  cy="182" r="3.5"/>
      <circle cx="151" cy="121" r="3.5"/>
      <circle cx="128" cy="147" r="3.5"/>
      <circle cx="72"  cy="208" r="3.5"/>
      <circle cx="157" cy="117" r="3.5"/>
      <circle cx="84"  cy="195" r="3.5"/>
      <circle cx="185" cy="46"  r="3.5"/>
      <circle cx="117" cy="160" r="3.5"/>
      <circle cx="78"  cy="208" r="3.5"/>
      <circle cx="139" cy="134" r="3.5"/>
      <circle cx="106" cy="173" r="3.5"/>
      <circle cx="128" cy="147" r="3.5"/>
    </g>

    <!-- 右上角 r 标注 -->
    <g transform="translate(364, 0)">
      <rect x="-86" y="3" width="86" height="16" rx="4" ry="4" fill="#FBF9F4" stroke="#6B4E8C" stroke-width="1"/>
      <text x="-43" y="15" class="mono" font-size="11" fill="#6B4E8C" text-anchor="middle">r ≈ 0.995</text>
    </g>
  </g>
</svg>
