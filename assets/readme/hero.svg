<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="100%" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">身高体重数据分析</title>
  <desc id="heroDesc">身高体重相关性分析项目封面。左侧为标题与统计方法标签,右侧为 30 名大学生身高-体重散点图与回归趋势线,呈强正相关(r ≈ 0.995)。</desc>

  <defs>
    <style>
      .stack { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mono  { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
      .serif { font-family: Georgia, "Times New Roman", "Songti SC", serif; }
    </style>
  </defs>

  <!-- 纸面背景 -->
  <rect x="0" y="0" width="1200" height="380" rx="26" ry="26" fill="#FBF9F4"/>

  <!-- ============ 左侧标题块 ============ -->
  <g transform="translate(56, 48)">
    <!-- 顶部细色条,主色单色,非渐变 -->
    <rect x="0" y="0" width="56" height="3" fill="#6B4E8C"/>

    <!-- 小标签 -->
    <text x="0" y="34" class="mono" font-size="14" letter-spacing="2.4" fill="#8B8680">STATISTICS · CORRELATION</text>

    <!-- 大标题 -->
    <text x="0" y="96" class="stack" font-size="44" font-weight="700" fill="#1A1A1A">身高体重数据分析</text>

    <!-- 副标题 -->
    <text x="0" y="138" class="stack" font-size="18" fill="#8B8680">Shapiro-Wilk · Pearson · Spearman · 30 样本</text>

    <!-- 元数据 -->
    <text x="0" y="174" class="mono" font-size="14" fill="#8B8680">Python 3 · numpy · scipy.stats · matplotlib</text>

    <!-- 底部元数据 -->
    <text x="0" y="268" class="mono" font-size="12" fill="#8B8680">n=30 · 大学生样本 · 作者 liem</text>
  </g>

  <!-- ============ 右侧散点图 ============ -->
  <!-- 整体容器:宽 384 高 280,位于 (760, 48) -->
  <g transform="translate(760, 48)">
    <!-- 卡片轻底,与纸面有微弱区分 -->
    <rect x="0" y="0" width="384" height="280" rx="8" ry="8" fill="#FFFFFF" stroke="#E4E0D8" stroke-width="1"/>

    <!-- 绘图区参数:
         plot area: x in [50, 364] (宽 314), y in [20, 240] (高 220)
         data x: 164..178, data y: 51..76 -->

    <!-- 横向网格线(4 等分) -->
    <g stroke="#EDE9E0" stroke-width="1">
      <line x1="50" y1="20"  x2="364" y2="20"/>
      <line x1="50" y1="75"  x2="364" y2="75"/>
      <line x1="50" y1="130" x2="364" y2="130"/>
      <line x1="50" y1="185" x2="364" y2="185"/>
      <line x1="50" y1="240" x2="364" y2="240"/>
    </g>

    <!-- 坐标轴 -->
    <line x1="50" y1="240" x2="364" y2="240" stroke="#1A1A1A" stroke-width="1"/>
    <line x1="50" y1="20"  x2="50"  y2="240" stroke="#1A1A1A" stroke-width="1"/>

    <!-- x 轴刻度与标签 (身高 164..178) -->
    <g class="mono" font-size="10" fill="#8B8680" text-anchor="middle">
      <text x="50"  y="256">164</text>
      <text x="117" y="256">167</text>
      <text x="185" y="256">170</text>
      <text x="252" y="256">173</text>
      <text x="319" y="256">176</text>
      <text x="364" y="256">178</text>
    </g>

    <!-- y 轴刻度与标签 (体重 51..76) -->
    <g class="mono" font-size="10" fill="#8B8680" text-anchor="end">
      <text x="44" y="244">51</text>
      <text x="44" y="200">56</text>
      <text x="44" y="156">61</text>
      <text x="44" y="112">66</text>
      <text x="44" y="68">71</text>
      <text x="44" y="24">76</text>
    </g>

    <!-- 轴标题 -->
    <text x="207" y="272" class="stack" font-size="11" fill="#1A1A1A" text-anchor="middle">身高 (cm)</text>
    <text x="14" y="130" class="stack" font-size="11" fill="#1A1A1A" text-anchor="middle" transform="rotate(-90, 14, 130)">体重 (kg)</text>

    <!-- 趋势线:深紫罗兰 2px,从左下到右上(回归趋势) -->
    <line x1="50" y1="240" x2="364" y2="20" stroke="#6B4E8C" stroke-width="2" stroke-linecap="round"/>

    <!-- 散点:砖红 #C44536, r=4,正相关分布(取自 30 样本代表性子集) -->
    <g fill="#C44536">
      <circle cx="50"  cy="240" r="4"/>
      <circle cx="72"  cy="231" r="4"/>
      <circle cx="117" cy="196" r="4"/>
      <circle cx="140" cy="178" r="4"/>
      <circle cx="162" cy="170" r="4"/>
      <circle cx="185" cy="143" r="4"/>
      <circle cx="207" cy="134" r="4"/>
      <circle cx="229" cy="117" r="4"/>
      <circle cx="252" cy="90"  r="4"/>
      <circle cx="274" cy="99"  r="4"/>
      <circle cx="297" cy="73"  r="4"/>
      <circle cx="319" cy="55"  r="4"/>
      <circle cx="342" cy="29"  r="4"/>
      <circle cx="364" cy="20"  r="4"/>
    </g>

    <!-- 右上角标注 r ≈ 0.995(30 样本实测值),置于卡片顶部留白内 -->
    <g transform="translate(364, 0)">
      <rect x="-86" y="3" width="86" height="16" rx="4" ry="4" fill="#FBF9F4" stroke="#6B4E8C" stroke-width="1"/>
      <text x="-43" y="15" class="mono" font-size="11" fill="#6B4E8C" text-anchor="middle">r ≈ 0.995</text>
    </g>
  </g>
</svg>
